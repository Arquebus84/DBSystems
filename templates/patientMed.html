{% extends 'base.html' %}

{% block patientMed %}
<div class="tableDiv">
    <table class="tableFormat">
        <th class="tableCellFormat">Patient</th><th class="tableCellFormat">Medication</th><th class="tableCellFormat">Actions</th>
        <tr>
            {% for patientMed in patient_medications %}
                <tr>
                    <td class="tableCellFormat">{{ patientMed[0] }}</td>
                    <td class="tableCellFormat">{{ patientMed[1] }}</td>
                    <td class="tableCellFormat">
                        <a href="">Delete</a>
                        <a href="">Update</a>
                    </td>
                </tr>
            {% endfor %}
        </tr>
    </table>
</div>
<div>
    <div class= "divForm">
        <form action="/home/add", method="POST", class="tableForm">
            <input type="select", id="'content" name="Patient", class="tableInput">
            <input type="select", id="'content" name="Medication", class="tableInput">
            <input type="submit", name="addRow">
        </form>
    </div>
</div>
{% endblock %}
