{% extends 'base.html' %}

{% block room %}
<div class="tableDiv">
    <table class="tableFormat">
        <tr>
            <th class="tableCellFormat">roomID</th><th class="tableCellFormat">patientID</th><th class="tableCellFormat">Room Number</th><th class="tableCellFormat">Actions</th>
        </tr>
        <tr>
            {% for r in room %}
                <tr>
                    <td class="tableCellFormat">{{ r[0] }}</td>
                    <td class="tableCellFormat">{{ r[1] }}</td>
                    <td class="tableCellFormat">{{ r[2] }}</td>
                    <td class="tableCellFormat">
                        <a href="">Delete</a>
                        <a href="">Update</a>
                    </td>
                </tr>
            {% endfor %}
        </tr>
    </table>
</div>
<div>
    <div class= "divForm">
        <form action="/home/add", method="POST", class="tableForm">
            <input type="select", id="'content" name="content", class="tableInput">
            <input type="select", id="'content" name="content", class="tableInput">
            <input type="select", id="'content" name="content", class="tableInput">
            <input type="submit", name="addRow">
        </form>
    </div>
</div>
{% endblock %}
