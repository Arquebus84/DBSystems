{% extends 'base.html' %}

{% block assignment %}
<div class="tableDiv">
    <table class="tableFormat">
        <tr>
            <th class="tableCellFormat">Faculty</th><th class="tableCellFormat">Patient First Name</th><th class="tableCellFormat">Patient Last Name</th>
            <th class="tableCellFormat">Room</th><th class="tableCellFormat">Floor Number</th> <th class="tableCellFormat">Actions</th>
        </tr>
        <tr>
            {% for a in assign %}
            <tr>
                <td class="tableCellFormat">{{ a[0] }}</td>
                <td class="tableCellFormat">{{ a[1] }}</td>
                <td class="tableCellFormat">{{ a[2] }}</td>
                <td class="tableCellFormat">{{ a[3] }}</td>
                <td class="tableCellFormat">{{ a[4] }}</td>
                <td class="tableCellFormat">
                    <a href="">Delete</a>
                    <a href="">Update</a>
                </td>
            </tr>
            {% endfor %}
        </tr>
    </table>
</div>
<div>
    <div class= "divForm">
        <form action="/home/add", method="POST", class="tableForm">
            <input type="select", id="'content" name="content", class="tableInput">
            <input type="select", id="'content" name="content", class="tableInput">
            <input type="submit", name="addRow">
        </form>
    </div>
</div>
{% endblock %}
