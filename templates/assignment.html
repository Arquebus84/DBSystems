{% extends 'base.html' %}

{% block assignment %}
<div class="tableDiv">
    <table class="tableFormat">
        <tr>
            <th class="tableCellFormat">AssignedRoomID</th><th class="tableCellFormat">Faculty</th><th class="tableCellFormat">Patient First Name</th>
            <th class="tableCellFormat">Patient Last Name</th><th class="tableCellFormat">Room</th>
            <th class="tableCellFormat">Floor Number</th> <th class="tableCellFormat">Actions</th>
        </tr>
        <tr>
            {% for a in assign %}
            <tr>
                <td class="tableCellFormat">{{ a[0] }}</td>
                <td class="tableCellFormat">{{ a[1] }}</td>
                <td class="tableCellFormat">{{ a[2] }}</td>
                <td class="tableCellFormat">{{ a[3] }}</td>
                <td class="tableCellFormat">{{ a[4] }}</td>
                <td class="tableCellFormat">{{ a[5] }}</td>
                <td class="tableCellFormat">
                    <a href="{{ url_for('deleteAssignment', id=a[0]) }}">Delete</a>
                    <a href="">Update</a>
                </td>
            </tr>
            {% endfor %}
        </tr>
    </table>
</div>
<div>
    <div class= "divForm">
        <form action="/home/faculty-options/addAssignment", method="POST", class="tableForm">
            <select id="'content" name="patientRoomID", class="tableInput">
                {% for rm in room %}
                    <option value="{{ rm[0] }}">{{ rm[1] }}</option>
                {% endfor %}
            </select>
            <select id="'content" name="facultyID", class="tableInput">
                 {% for f in faculty %}
                    <option value="{{ f[0] }}" >{{ f[1] }}</option>
                {% endfor %} 
            </select>
            <input type="submit", name="addRow">
        </form>
    </div>
</div>
{% endblock %}
