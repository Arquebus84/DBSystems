
{% extends 'base.html' %}

<!--Faculty Table-->
{% block faculty %}
<div class="tableDiv">
    <table class="tableFormat">
        <tr>
            <th class="tableCellFormat">FacultyID</th><th class="tableCellFormat">Faculty Last Name</th>
            <th class="tableCellFormat">Faculty Type</th><th class="tableCellFormat">Actions</th>
        </tr>
        <tr>
            {% for f in faculty%}
            <tr>
                <td class="tableCellFormat">{{ f[0] }}</td>
                <td class="tableCellFormat">{{ f[1] }}</td>
                <td class="tableCellFormat">{{ f[2] }}</td>
                <td class="tableCellFormat">
                    <a href="{{ url_for('deleteFaculty', id=f[0]) }}">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tr>
    </table>
</div>
<div>
    <div class= "divForm">
        <form action="/home/faculty-options/addFaculty", method="POST", class="tableForm">
            <input type="select", id="content" name="facultyLastName", class="tableInput">
            <select id="'content" name="facultyTypeID", class="tableInput">
                {% for type in facultyType %}
                    <option value="{{ type[0] }}">{{ type[1] }}</option>
                {% endfor %}
            </select>
            <input type="submit", name="addRow">
        </form>
    </div>
</div>
{% endblock %}
