
{% extends 'base.html' %}

<!--Faculty Table-->
{% block faculty %}
<div class="tableDiv">
    <table class="tableFormat">
        <tr>
            <th class="tableCellFormat">facultyID</th><th class="tableCellFormat">Faculty Last Name</th><th class="tableCellFormat">Faculty Type</th><th class="tableCellFormat">Actions</th>
        </tr>
        <tr>
            {% for f in faculty%}
            <tr>
                <td class="tableCellFormat">{{ f[0] }}</td>
                <td class="tableCellFormat">{{ f[1] }}</td>
                <td class="tableCellFormat">{{ f[2] }}</td>
                <td class="tableCellFormat">
                    <a href="">Delete</a>
                    <a href="">Update</a>
                </td>
            </tr>
            {% endfor %}
        </tr>
    </table>
</div>
<div>
    <div class= "divForm">
        <form action="/home/add", method="POST", class="tableForm">
            <input type="select", id="'content" name="content", class="tableInput">
            <input type="select", id="'content" name="content", class="tableInput">
            <input type="select", id="'content" name="content", class="tableInput">
            <input type="submit", name="addRow">
        </form>
    </div>
</div>
{% endblock %}
